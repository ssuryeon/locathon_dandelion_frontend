<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9efff" />
      <stop offset="1" stop-color="#f7f8ff" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#d7ddf5" stroke-width="1" opacity="0.6" />
    </pattern>
    <radialGradient id="spotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#8a5cff" stop-opacity="0.18" />
      <stop offset="1" stop-color="#8a5cff" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="900" height="540" fill="url(#bg)" />
  <rect width="900" height="540" fill="url(#grid)" />

  <!-- Center "landmark" blob -->
  <circle cx="450" cy="270" r="260" fill="url(#spotGlow)" />

  <!-- Fake roads -->
  <path d="M 30 410 C 180 300, 270 350, 420 250 S 720 150, 880 80" fill="none" stroke="#c4c9e6" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <path d="M 40 140 C 200 220, 280 170, 430 240 S 700 390, 860 460" fill="none" stroke="#c4c9e6" stroke-width="7" stroke-linecap="round" opacity="0.55"/>
  <path d="M 120 60 L 220 240 L 140 420 L 310 470 L 520 340 L 610 140 L 760 70" fill="none" stroke="#d3d7f0" stroke-width="6" stroke-linecap="round" opacity="0.5"/>

  <!-- Border -->
  <rect x="6" y="6" width="888" height="528" rx="24" ry="24" fill="none" stroke="#bfc6ea" stroke-width="2" opacity="0.85"/>
</svg>

